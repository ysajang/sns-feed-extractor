<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Feed Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <header class="header">
      <div class="header-title">
        <span class="header-icon">📋</span>
        <h1>Feed Extractor</h1>
      </div>
      <div id="platform-badge" class="badge badge-inactive">
        <span id="platform-icon">—</span>
        <span id="platform-name" data-i18n="detecting"></span>
      </div>
    </header>

    <!-- 설정 -->
    <section class="settings">
      <label class="setting-row">
        <span class="setting-label" data-i18n="removeLinks"></span>
        <input type="checkbox" id="opt-remove-links" checked>
        <span class="toggle"></span>
      </label>
      <label class="setting-row">
        <span class="setting-label" data-i18n="includeAds"></span>
        <input type="checkbox" id="opt-include-ads">
        <span class="toggle"></span>
      </label>
      <div class="setting-row">
        <span class="setting-label" data-i18n="maxCount"></span>
        <div class="stepper">
          <button id="opt-max-down" class="stepper-btn" type="button">−</button>
          <input type="number" id="opt-max-count" min="1" max="200" value="50" step="1">
          <button id="opt-max-up" class="stepper-btn" type="button">+</button>
        </div>
      </div>
    </section>

    <!-- 액션 버튼 -->
    <div class="actions">
      <button id="btn-extract" class="btn btn-primary" disabled>
        <span class="btn-icon">⚡</span>
        <span class="btn-text" data-i18n="extract"></span>
      </button>
      <button id="btn-stop" class="btn btn-stop hidden">
        <span class="btn-icon">⏹</span>
        <span class="btn-text" data-i18n="stop"></span>
      </button>
    </div>

    <!-- 결과 영역 -->
    <div id="result-area" class="result-area hidden">
      <div class="result-header">
        <span id="result-count" class="result-count"></span>
        <button id="btn-copy" class="btn btn-small" data-i18n="copy"></button>
      </div>
      <textarea id="result-text" class="result-text" readonly data-i18n-placeholder="placeholder"></textarea>
    </div>

    <!-- 상태 메시지 -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-icon"></span>
      <span id="status-message"></span>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <a href="https://github.com/ysajang/sns-feed-extractor/issues" target="_blank">💬 Feedback</a>
      <span class="footer-sep">·</span>
      <a id="link-updates" href="#" target="_blank">📧 Get Updates</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
